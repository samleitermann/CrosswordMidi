name: Daily Data Update

on:
  schedule:
    - cron: "15 5 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  scrape-and-plot:
    runs-on: ubuntu-latest
    env:
      NYT_S: ${{ secrets.NYT_S }}
      NYT_XWORD_START: "2021-01-01"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate NYT token secret
        run: |
          if [ -z "${NYT_S}" ]; then
            echo "Missing required repository secret: NYT_S"
            exit 1
          fi

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install plot dependencies
        run: pip3 install -r plot/requirements.txt

      - name: Run scraper
        run: cargo run --release -- data.csv

      - name: Generate plot
        run: python3 plot/plot.py data.csv plot.png

      - name: Commit and push updates
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data.csv plot.png
          if git diff --cached --quiet; then
            echo "No changes to commit."
            exit 0
          fi
          git commit -m "chore: daily data and plot update"
          git push
