name: Update NYT Crossword Graph

on:
  schedule:
    # Runs daily at 10:30 UTC.
    # This is 6:30 AM Eastern during daylight saving time
    # and 5:30 AM Eastern during standard time.
    - cron: "30 10 * * *"

  # Allows you to run it manually from the GitHub Actions tab
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-crossword-graph:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Scrape NYT crossword times
        run: |
          cargo run --release -- -t "${{ secrets.NYT_S }}" -s 2026-02-25 data.csv

      - name: Install Python plotting requirements
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r plot/requirements.txt

      - name: Generate crossword graph
        run: |
          mkdir -p assets
          python plot/plot.py data.csv assets/crossword-times.png

      - name: Update README with graph and stats
        run: |
          python - <<'PY'
          import csv
          import datetime
          from pathlib import Path

          readme_path = Path("README.md")
          if readme_path.exists():
              readme = readme_path.read_text()
          else:
              readme = "# Crossword\n\n"

          def replace_section(text, start_marker, end_marker, new_content):
              if start_marker in text and end_marker in text:
                  before = text.split(start_marker)[0]
                  after = text.split(end_marker)[1]
                  return before + start_marker + "\n" + new_content + "\n" + end_marker + after
              return text

          # Last-run timestamp
          now_utc = datetime.datetime.now(datetime.timezone.utc)
          last_run_str = now_utc.strftime("%Y-%m-%d at %H:%M UTC")
          readme = replace_section(
              readme,
              "<!-- last-run:start -->",
              "<!-- last-run:end -->",
              f"**Last updated:** {last_run_str}",
          )

          # Most recent solve from data.csv
          data_path = Path("data.csv")
          latest_date = latest_weekday = latest_secs = None
          if data_path.exists():
              with open(data_path, newline="") as f:
                  rows = list(csv.DictReader(f))
              for row in reversed(rows):
                  if row.get("solve_time_secs") and row.get("cheated", "false").lower() == "false":
                      latest_date = row["date"]
                      latest_weekday = row["weekday"]
                      latest_secs = int(row["solve_time_secs"])
                      break
          if latest_date and latest_secs is not None:
              mins, secs = divmod(latest_secs, 60)
              time_str = f"{mins}:{secs:02d}" if mins else f"{secs}s"
              latest_solve_content = f"**Most recent solve:** {latest_date} ({latest_weekday}) — {time_str}"
          else:
              latest_solve_content = "**Most recent solve:** _no data_"
          readme = replace_section(
              readme,
              "<!-- latest-solve:start -->",
              "<!-- latest-solve:end -->",
              latest_solve_content,
          )

          # Graph section
          graph_markdown = (
              "<!-- crossword-graph:start -->\n"
              "## NYT Crossword Times\n\n"
              "![NYT Crossword Times](assets/crossword-times.png)\n\n"
              "_Updated daily by GitHub Actions._\n"
              "<!-- crossword-graph:end -->"
          )
          start = "<!-- crossword-graph:start -->"
          end = "<!-- crossword-graph:end -->"
          if start in readme and end in readme:
              before = readme.split(start)[0]
              after = readme.split(end)[1]
              readme = before + graph_markdown + after
          else:
              readme = readme.rstrip() + "\n\n" + graph_markdown + "\n"

          readme_path.write_text(readme)
          PY

      - name: Commit updated files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add data.csv assets/crossword-times.png README.md

          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "Update crossword data and graph"
            git push
          fi
